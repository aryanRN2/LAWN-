<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details | Maurya's Lawn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background-color: #081c15; color: white; }
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            color: white;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="fw-bold mb-4">Event <span class="text-accent">Information</span></h2>
            <p class="text-white-50 mb-4">Selected Dates: <span class="text-white fw-bold">{{ dates }}</span></p>
            
            <form action="{{ url_for('confirm_booking') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label">Your Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" placeholder="Enter your phone number" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Event Type</label>
                    <select name="event_type" id="eventType" class="form-select" required onchange="toggleDescription(this.value)">
                        <option value="" disabled selected>Select event type...</option>
                        <option value="Birthday">Birthday</option>
                        <option value="Anniversary">Anniversary</option>
                        <option value="Wedding">Wedding</option>
                        <option value="Else">Something Else</option>
                    </select>
                </div>
                
                <div class="mb-4 d-none" id="descriptionField">
                    <label class="form-label">Tell us more</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Please describe your event..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 py-3 mt-2">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script>
        function toggleDescription(value) {
            const field = document.getElementById('descriptionField');
            if (value === 'Else') {
                field.classList.remove('d-none');
            } else {
                field.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
