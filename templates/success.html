<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | Maurya's Lawn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background-color: #081c15; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .success-card {
            padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .icon-box {
            font-size: 5rem;
            color: var(--accent-color);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="success-card">
                    <div class="icon-box">
                        <i class="bi bi-check2-circle"></i>
                    </div>
                    <h1 class="display-4 fw-bold mb-4">Request Sent!</h1>
                    <p class="lead mb-5 text-white-50">We have received your booking request. <br> <span class="text-white fw-bold">We will connect you soon</span> to finalize the details.</p>
                    <a href="/" class="btn btn-primary btn-lg px-5 py-3">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
